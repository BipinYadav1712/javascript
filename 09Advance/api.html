<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API</title>
</head>
<body style="background-color: #212121;">
   <h3> 0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete.</h3>
<img src="" alt="Hitesh Choudhary" width="200px">
<p id="followers">
</p>
</body>
<script>
const requestURL = 'https://api.github.com/users/hiteshchoudhary'
const xhr = new XMLHttpRequest();
xhr.open('GET',requestURL)
xhr.onreadystatechange = function(){
    console.log(xhr.readyState);
    if(xhr.readyState === 4){
        const data = JSON.parse(this.responseText)
        console.log(data);
        
        console.log(typeof data);
        console.log(data.followers);
        // profile image use
document.querySelector('img').src =data.avatar_url;

// followers count
document.querySelector("#followers").innerHTML = "followers : = " + data.followers;
        
    }  
}
xhr.send();

</script>
</html>
